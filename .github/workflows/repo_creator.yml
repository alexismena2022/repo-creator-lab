name: Repo Creator Lab

on:
  workflow_dispatch:
    inputs:

      repo_name:
        description: 'Nombre del repo'
        required: true

      language:
        description: 'Lenguaje'
        required: true
        default: 'java'

      build_tool:
        description: 'Build Tool'
        required: true
        default: 'gradle'

      cloud:
        description: 'Cloud'
        required: true
        default: 'ocp'

      redis:
        description: 'Usa Redis'
        required: true
        default: 'false'

jobs:
  create-repo:
    runs-on: ubuntu-latest

    steps:

      - name: Crear repositorio
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

        run: |

          curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/user/repos \
          -d '{
            "name":"${{ github.event.inputs.repo_name }}",
            "private":true
          }'

      - name: Mostrar configuración
        run: |
          echo "Repo: ${{ github.event.inputs.repo_name }}"
          echo "Lenguaje: ${{ github.event.inputs.language }}"
          echo "Build Tool: ${{ github.event.inputs.build_tool }}"
          echo "Cloud: ${{ github.event.inputs.cloud }}"
          echo "Redis: ${{ github.event.inputs.redis }}"    